<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Casino Royal Pro</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0a3d1d; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .plate { width: 160px; height: 160px; background: #eee; border-radius: 50%; margin: 20px auto; position: relative; display: flex; justify-content: center; align-items: center; gap: 10px; border: 5px solid #555; }
        .dice { width: 35px; height: 35px; background: white; color: black; border-radius: 5px; line-height: 35px; font-weight: bold; font-size: 20px; }
        .bowl { width: 170px; height: 170px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; z-index: 10; transition: 0.5s; border: 2px solid orange; }
        .bowl.open { transform: translateY(-120px) rotate(20deg); opacity: 0.8; }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } }
        .btn { background: #f1c40f; padding: 12px 25px; border-radius: 25px; cursor: pointer; color: black; font-weight: bold; border: none; margin: 10px; }
        input { padding: 10px; border-radius: 20px; border: none; text-align: center; }
    </style>
</head>
<body>
    <div id="login-box">
        <h1>🎰 CASINO ROYAL</h1>
        <input type="text" id="uname" placeholder="Nhập tên ní..."><br><br>
        <button class="btn" onclick="login()">VÀO SÒNG</button>
    </div>

    <div id="game-box" style="display:none">
        <p>👤 <span id="display-name"></span> | 💰 <span id="balance">0</span> xu</p>
        <div class="plate">
            <div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div>
            <div id="bowl" class="bowl"></div>
        </div>
        <h2 id="status">CHỜ NHÀ CÁI...</h2>
        <button class="btn" style="background:#e74c3c" onclick="choose('Tai')">TÀI</button>
        <button class="btn" style="background:#3498db" onclick="choose('Xiu')">XỈU</button>
        <br><br>
        <input type="number" id="bet-amt" placeholder="Số xu cược">
        
        <div id="admin-tools" style="display:none; margin-top: 30px; border-top: 2px dashed gold; padding-top: 20px;">
            <p style="color:yellow">CÔNG CỤ NHÀ CÁI</p>
            <button class="btn" onclick="handleXoc()">🎲 XÓC ĐĨA</button>
            <button class="btn" style="background:#2ecc71" onclick="handleMo()">🔓 MỞ BÁT</button>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let myUser = "", myChoice = "";

function login() {
    myUser = document.getElementById("uname").value.trim();
    if(!myUser) return alert("Nhập tên mới vào được ní!");
    if(!localStorage.getItem(myUser)) localStorage.setItem(myUser, 10000);
    document.getElementById("login-box").style.display = "none";
    document.getElementById("game-box").style.display = "block";
    document.getElementById("display-name").innerText = myUser;
    if(myUser.toLowerCase() === "admin") document.getElementById("admin-tools").style.display = "block";
    renderUI();
    listenServer();
}

function renderUI() { 
    let money = localStorage.getItem(myUser) || 0;
    document.getElementById("balance").innerText = parseInt(money).toLocaleString(); 
}

function choose(s) { myChoice = s; alert("Ní đã đặt: " + s.toUpperCase()); }

function handleXoc() {
    const res = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
    db.ref('shaking').set({ state: "on", dice: res });
}

function handleMo() { db.ref('shaking/state').set("off"); }

function listenServer() {
    db.ref('shaking').on('value', (snapshot) => {
        const data = snapshot.val(); 
        if(!data) return;
        const bowlEl = document.getElementById("bowl");
        
        if(data.state === "on") {
            bowlEl.classList.add("shake"); 
            bowlEl.classList.remove("open");
            document.getElementById("status").innerText = "ĐANG XÓC ĐĨA...";
        } else {
            bowlEl.classList.remove("shake"); 
            bowlEl.classList.add("open");
            document.getElementById("d1").innerText = data.dice[0];
            document.getElementById("d2").innerText = data.dice[1];
            document.getElementById("d3").innerText = data.dice[2];
            let total = data.dice[0] + data.dice[1] + data.dice[2];
            let result = total >= 11 ? "Tai" : "Xiu";
            document.getElementById("status").innerText = total + " - " + result.toUpperCase();
            
            if(myChoice !== "") {
                let bet = parseInt(document.getElementById("bet-amt").value) || 0;
                let current = parseInt(localStorage.getItem(myUser));
                if(myChoice === result) {
                    localStorage.setItem(myUser, current + bet);
                    alert("LỤM LÚA! +" + bet);
                } else {
                    localStorage.setItem(myUser, current - bet);
                    alert("XUI QUÁ, MẤT " + bet);
                }
                myChoice = ""; renderUI();
            }
        }
    });
}
</script>
</body>
</html>
