<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Casino Royal Pro - Nhà Cái Cầm Cái</title>
    <!-- Nhúng thư viện Firebase chuẩn -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0a3d1d; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .plate { width: 150px; height: 150px; background: #eee; border-radius: 50%; margin: 20px auto; position: relative; display: flex; justify-content: center; align-items: center; border: 5px solid #777; }
        .bowl { width: 160px; height: 160px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; transition: 0.5s; z-index: 10; }
        .bowl.open { transform: translateY(-120px) rotate(20deg); opacity: 0.8; }
        .dice { color: black; font-size: 25px; font-weight: bold; }
        .btn { padding: 12px 20px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 20px; border: none; background: gold; }
        input { padding: 10px; border-radius: 15px; border: none; margin: 5px; text-align: center; }
        #admin-panel { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px dashed gold; display: none; }
        #soi-kq { color: #00ff00; font-size: 1.5rem; font-weight: bold; min-height: 30px; margin: 10px; }
    </style>
</head>
<body>
    <div id="login-box">
        <h1>🎰 CASINO ROYAL</h1>
        <input type="text" id="uname" placeholder="Nhập tên ní..."><br>
        <button class="btn" onclick="login()">VÀO SÒNG</button>
    </div>

    <div id="game-box" style="display:none;">
        <p>👤 <span id="n"></span> | 💰 <b id="m">0</b> xu</p>
        <div class="plate">
            <div id="res" class="dice">?</div>
            <div id="bat" class="bowl"></div>
        </div>
        <h2 id="st">CHỜ NHÀ CÁI...</h2>

        <div id="user-panel">
            <button class="btn" style="background:red; color:white" onclick="dat('Tai')">TÀI</button>
            <button class="btn" style="background:blue; color:white" onclick="dat('Xiu')">XỈU</button>
            <br><input type="number" id="cuoc" placeholder="Số xu cược">
        </div>

        <div id="admin-panel">
            <p style="color:gold; font-weight:bold;">QUYỀN LỰC NHÀ CÁI</p>
            <div id="soi-kq"></div>
            <button class="btn" onclick="xoc()">🎲 XÓC ĐĨA</button>
            <button class="btn" style="background:lime" onclick="mo()">🔓 MỞ BÁT</button>
            <hr>
            <p>BƠM TIỀN CHO ĐỆ</p>
            <input type="text" id="target" placeholder="Tên đệ nhận">
            <input type="number" id="buff-amt" placeholder="Số xu">
            <button class="btn" style="background:white" onclick="buff()">XÁC NHẬN BƠM</button>
        </div>
    </div>

<script>
// CONFIG ĐÃ CẬP NHẬT ĐÚNG DATABASE URL CỦA NÍ
var firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app", 
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var user = "", side = "";

function login() {
    user = document.getElementById("uname").value.trim();
    if(!user) { alert("Nhập tên đã ní!"); return; }
    if(!localStorage.getItem(user)) localStorage.setItem(user, 10000);
    
    document.getElementById("login-box").style.display = "none";
    document.getElementById("game-box").style.display = "block";
    document.getElementById("n").innerText = user;
    
    if(user.toLowerCase() === "admin") {
        document.getElementById("admin-panel").style.display = "block";
    }
    updateUI();
    listenServer();
}

function updateUI() { 
    var money = localStorage.getItem(user) || 0;
    document.getElementById("m").innerText = parseInt(money).toLocaleString(); 
}

function dat(s) { side = s; alert("Đã chốt: " + s.toUpperCase()); }

function xoc() {
    var d1 = Math.floor(Math.random()*6)+1;
    var d2 = Math.floor(Math.random()*6)+1;
    var d3 = Math.floor(Math.random()*6)+1;
    db.ref('shaking').set({ st: "xoc", d: [d1, d2, d3] });
}

function mo() { db.ref('shaking/st').set("mo"); }

function buff() {
    var t = document.getElementById("target").value.trim();
    var a = parseInt(document.getElementById("buff-amt").value);
    if(t && a) {
        db.ref('buffs/' + t).set({ amount: a, t: Date.now() });
        alert("Đã gửi lệnh bơm " + a + " xu cho " + t);
    }
}

function listenServer() {
    db.ref('shaking').on('value', function(snap) {
        var data = snap.val(); if(!data) return;
        var b = document.getElementById("bat");
        if(data.st === "xoc") {
            b.classList.remove("open");
            document.getElementById("st").innerText = "ĐANG XÓC ĐĨA...";
            document.getElementById("res").innerText = "?";
            if(user.toLowerCase() === "admin") {
                var sum = data.d[0] + data.d[1] + data.d[2];
                var kq = sum >= 11 ? "TÀI" : "XỈU";
                document.getElementById("soi-kq").innerText = "SOI: " + kq + " (" + sum + ")";
            }
        } else {
            b.classList.add("open");
            var sum = data.d[0] + data.d[1] + data.d[2];
            var res = sum >= 11 ? "Tai" : "Xiu";
            document.getElementById("res").innerText = sum;
            document.getElementById("st").innerText = res.toUpperCase();
            if(user.toLowerCase() === "admin") document.getElementById("soi-kq").innerText = "";
            if(side !== "") {
                var cuoc = parseInt(document.getElementById("cuoc").value) || 0;
                var money = parseInt(localStorage.getItem(user));
                localStorage.setItem(user, side === res ? money + cuoc : money - cuoc);
                side = ""; updateUI();
            }
        }
    });

    db.ref('buffs/' + user).on('value', function(snap) {
        var data = snap.val();
        if(data) {
            var money = parseInt(localStorage.getItem(user));
            localStorage.setItem(user, money + data.amount);
            updateUI();
            db.ref('buffs/' + user).remove();
            alert("ADMIN VỪA BƠM TIỀN CHO NÍ!");
        }
    });
}
</script>
</body>
</html>
