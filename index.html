<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal - Final Boss</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --bg: #0a2e1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .table { position: relative; height: 220px; display: flex; justify-content: center; align-items: center; }
        .plate { width: 200px; height: 200px; background: #ecf0f1; border-radius: 50%; border: 10px solid #95a5a6; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .dice { width: 45px; height: 45px; background: white; color: #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; }
        .bowl { width: 215px; height: 215px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; z-index: 10; transition: 0.8s; border: 2px solid #e67e22; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .bowl.open { transform: translateY(-160px) rotate(30deg); opacity: 0.9; pointer-events: none; }
        .shake-anim { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(3deg); } 100% { transform: rotate(-3deg); } }
        .circle-btn { width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 4px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .admin-only { background: rgba(183, 28, 28, 0.9); padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--gold); display: none; }
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 999; }
        input { padding: 12px; border-radius: 25px; border: none; width: 85%; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div style="background:#1e272e; padding:40px; border-radius:20px; text-align:center; border: 2px solid var(--gold); width: 80%;">
        <h1 style="color:var(--gold)">🎰 CASINO ROYAL</h1>
        <input type="text" id="username" placeholder="Tên nhân vật..."><br><br>
        <button class="btn-main" onclick="handleLogin()">VÀO SÒNG</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div>👤 <span id="u-name">...</span></div>
        <div style="color:var(--gold)">💰 <span id="u-balance">0</span></div>
    </div>
    <div class="table">
        <div class="plate"><div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div></div>
        <div id="bowl" class="bowl"></div>
    </div>
    <h2 id="status" style="color:var(--gold)">CHỜ NHÀ CÁI...</h2>
    <div class="zones" style="display:flex; justify-content:space-around; margin:20px 0;">
        <div id="z-tai" class="circle-btn" style="background:var(--red)" onclick="pick('Tai')"><b>TÀI</b></div>
        <div id="z-xiu" class="circle-btn" style="background:var(--blue)" onclick="pick('Xiu')"><b>XỈU</b></div>
    </div>
    <input type="number" id="bet-amount" placeholder="Số xu cược...">
    <div id="admin-panel" class="admin-only">
        <div id="hack-view" style="color:#0f0; font-weight:bold; margin-bottom:10px;">SOI: ---</div>
        <button class="btn-main" onclick="shakeGame()">🎲 XÓC ĐĨA CHUNG</button>
        <button class="btn-main" id="btn-open-global" onclick="openBowl()" style="display:none; background:#2ecc71">🔓 MỞ BÁT CHUNG</button>
        <hr><input type="text" id="adm-target" placeholder="Tên người nhận"><input type="number" id="adm-amount" placeholder="Số xu">
        <button onclick="adminBuff()" style="background:white; color:black; width:100%; border-radius:10px; padding:10px; font-weight:bold; border:none; cursor:pointer;">XÁC NHẬN BƠM</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app", 
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let player = "", selectedSide = "", isAdmin = false;

function handleLogin() {
    player = document.getElementById("username").value.trim();
    if(!player) return alert("Nhập tên ní ơi!");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("u-name").innerText = player;
    if(!localStorage.getItem(player)) localStorage.setItem(player, 1000);
    if(player.toLowerCase() === "admin") {
        isAdmin = true;
        document.getElementById("admin-panel").style.display = "block";
    }
    updateUI();
    listenGame();
}

function updateUI() {
    let m = localStorage.getItem(player) || 0;
    document.getElementById("u-balance").innerText = parseInt(m).toLocaleString() + " xu";
}

function pick(s) {
    selectedSide = s;
    document.getElementById("z-tai").style.border = (s==='Tai')?"5px solid #fff":"4px solid rgba(255,255,255,0.2)";
    document.getElementById("z-xiu").style.border = (s==='Xiu')?"5px solid #fff":"4px solid rgba(255,255,255,0.2)";
}

function shakeGame() {
    const d = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
    db.ref('game_state').set({ status: "shaking", dice: d });
}

function openBowl() {
    db.ref('game_state/status').set("open");
}

function listenGame() {
    db.ref('game_state').on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        const bowl = document.getElementById("bowl");

        if(data.status === "shaking") {
            bowl.classList.remove("open"); bowl.classList.add("shake-anim");
            document.getElementById("status").innerText = "ĐANG XÓC ĐĨA...";
            if(isAdmin) {
                document.getElementById("btn-open-global").style.display = "block";
                let sum = data.dice[0] + data.dice[1] + data.dice[2];
                document.getElementById("hack-view").innerText = "SOI: " + (sum >= 11 ? "TÀI" : "XỈU") + " ("+sum+")";
            }
        }

        if(data.status === "open") {
            bowl.classList.remove("shake-anim"); bowl.classList.add("open");
            let sum = data.dice[0] + data.dice[1] + data.dice[2];
            let res = (sum >= 11) ? "Tai" : "Xiu";
            document.getElementById("d1").innerText = data.dice[0];
            document.getElementById("d2").innerText = data.dice[1];
            document.getElementById("d3").innerText = data.dice[2];
            document.getElementById("status").innerText = sum + " - " + res.toUpperCase();

            if(selectedSide !== "") {
                let bal = parseInt(localStorage.getItem(player)), bet = parseInt(document.getElementById("bet-amount").value)||0;
                let nB = (selectedSide === res)?(bal+bet):(bal-bet);
                localStorage.setItem(player, nB); updateUI(); selectedSide = "";
                setTimeout(()=>alert(nB>=bal?"HÚP! 🎉":"THUA RỒI! 💸"), 200);
            }
            if(isAdmin) document.getElementById("btn-open-global").style.display = "none";
        }
    });

    db.ref('buffs/' + player).on('value', (snap) => {
        const amount = snap.val();
        if(amount) {
            localStorage.setItem(player, (parseInt(localStorage.getItem(player))||0) + amount);
            updateUI(); alert("Admin đã bơm cho ní " + amount + " xu!");
            db.ref('buffs/' + player).remove();
        }
    });
}

function adminBuff() {
    const t = document.getElementById("adm-target").value.trim(), a = parseInt(document.getElementById("adm-amount").value);
    if(t && a) { db.ref('buffs/' + t).set(a); alert("Đã gửi lệnh bơm!"); }
}
</script>
</body>
</html>
