<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal Pro - Nhà Cái Cầm Cái</title>
    <!-- Nhúng Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --bg: #0a2e1a; }
        body { background: #0a3d1d; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .table { position: relative; height: 200px; display: flex; justify-content: center; align-items: center; }
        .plate { width: 180px; height: 180px; background: #eee; border-radius: 50%; border: 8px solid #777; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dice { width: 40px; height: 40px; background: white; color: #333; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; }
        .bowl { width: 190px; height: 190px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; z-index: 10; transition: 0.8s; border: 2px solid #e67e22; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .bowl.open { transform: translateY(-150px) rotate(30deg); opacity: 0.9; pointer-events: none; }
        .shake-anim { animation: shake 0.15s infinite; }
        @keyframes shake { 0% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
        .zones { display: flex; justify-content: space-around; margin: 25px 0; }
        .circle-btn { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 4px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .circle-btn.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 20px #fff; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .admin-panel { background: rgba(183, 28, 28, 0.9); padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--gold); }
        .overlay { position: fixed; inset: 0; background: #0a2e1a; display: flex; justify-content: center; align-items: center; z-index: 999; }
        input { padding: 12px; border-radius: 25px; border: none; width: 85%; margin: 5px 0; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div style="background:#1e272e; padding:40px; border-radius:20px; text-align:center; border:2px solid var(--gold);">
        <h1 style="color:var(--gold)">🎰 CASINO ROYAL</h1>
        <input type="text" id="username" placeholder="Nhập tên nhân vật..."><br><br>
        <button class="btn-main" onclick="login()">VÀO SÒNG</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div>👤 <span id="u-name">...</span></div>
        <div style="color:var(--gold)">💰 <span id="u-balance">0</span> xu</div>
    </div>
    <div class="table">
        <div class="plate"><div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div></div>
        <div id="bowl" class="bowl"></div>
    </div>
    <h2 id="status" style="color:var(--gold)">CHỜ NHÀ CÁI XÓC...</h2>
    <div class="zones">
        <div id="z-tai" class="circle-btn" style="background:var(--red)" onclick="pick('Tai')"><b>TÀI</b></div>
        <div id="z-xiu" class="circle-btn" style="background:var(--blue)" onclick="pick('Xiu')"><b>XỈU</b></div>
    </div>
    <input type="number" id="bet-amount" placeholder="Nhập số xu cược...">
    
    <div id="admin-panel" class="admin-panel" style="display:none">
        <div id="hack-view" style="color:#0f0; font-weight:bold; margin-bottom:10px; font-size:1.2rem;">SOI: ---</div>
        <button class="btn-main" onclick="shakeGame()">🎲 XÓC ĐĨA CHUNG</button>
        <button class="btn-main" id="btn-open" onclick="openBowl()" style="display:none; background:#2ecc71">🔓 MỞ BÁT CHUNG</button>
        <hr style="margin:10px 0; border: 0.5px solid #555;">
        <input type="text" id="adm-target" placeholder="Tên người nhận">
        <input type="number" id="adm-amount" placeholder="Số xu">
        <button onclick="adminBuff()" style="background:white; color:black; width:100%; border-radius:10px; padding:10px; font-weight:bold; border:none; cursor:pointer;">XÁC NHẬN BƠM</button>
    </div>
</div>

<script>
// --- ĐÃ DÁN MÃ FIREBASE CHUẨN CỦA NÍ ---
const firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app", 
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};

let db;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch (e) {
    alert("Lỗi kết nối Firebase!");
}

let player = "";
let selectedSide = "";
let isAdmin = false;

function login() {
    player = document.getElementById("username").value.trim();
    if(!player) return alert("Nhập tên đi ní!");
    if(!localStorage.getItem(player)) localStorage.setItem(player, 1000);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("u-name").innerText = player;
    if(player.toLowerCase() === "admin") {
        isAdmin = true;
        document.getElementById("admin-panel").style.display = "block";
    }
    updateUI();
    if(db) listenGame();
}

function updateUI() {
    let m = localStorage.getItem(player) || 0;
    document.getElementById("u-balance").innerText = parseInt(m).toLocaleString();
}

function pick(s) {
    selectedSide = s;
    document.getElementById("z-tai").style.border = (s==='Tai') ? "5px solid #fff" : "4px solid rgba(255,255,255,0.2)";
    document.getElementById("z-xiu").style.border = (s==='Xiu') ? "5px solid #fff" : "4px solid rgba(255,255,255,0.2)";
}

function shakeGame() {
    if(!db) return;
    const d1 = Math.floor(Math.random() * 6) + 1;
    const d2 = Math.floor(Math.random() * 6) + 1;
    const d3 = Math.floor(Math.random() * 6) + 1;
    db.ref('sòng_bài').set({ 
        trạng_thái: "đang_xóc", 
        xúc_ắc: [d1, d2, d3] 
    });
}

function openBowl() {
    if(!db) return;
    db.ref('sòng_bài/trạng_thái').set("đã_mở");
}

function listenGame() {
    db.ref('sòng_bài').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        const bowl = document.getElementById("bowl");

        if(data.trạng_thái === "đang_xóc") {
            bowl.classList.remove("open");
            bowl.classList.add("shake-anim");
            document.getElementById("status").innerText = "ĐANG XÓC ĐĨA...";
            if(isAdmin) {
                document.getElementById("btn-open").style.display = "block";
                let sum = data.xúc_ắc[0] + data.xúc_ắc[1] + data.xúc_ắc[2];
                let res = (sum >= 11) ? "TÀI" : "XỈU";
                document.getElementById("hack-view").innerText = `SOI: ${res} (${sum})`;
            }
        }

        if(data.trạng_thái === "đã_mở") {
            bowl.classList.remove("shake-anim");
            bowl.classList.add("open");
            let sum = data.xúc_ắc[0] + data.xúc_ắc[1] + data.xúc_ắc[2];
            let res = (sum >= 11) ? "Tai" : "Xiu";
            document.getElementById("d1").innerText = data.xúc_ắc[0];
            document.getElementById("d2").innerText = data.xúc_ắc[1];
            document.getElementById("d3").innerText = data.xúc_ắc[2];
            document.getElementById("status").innerText = `${sum} - ${res.toUpperCase()}`;

            if(selectedSide !== "") {
                let bal = parseInt(localStorage.getItem(player));
                let bet = parseInt(document.getElementById("bet-amount").value) || 0;
                let newBal = (selectedSide.toLowerCase() === res.toLowerCase()) ? (bal + bet) : (bal - bet);
                localStorage.setItem(player, newBal);
                updateUI();
                selectedSide = "";
                setTimeout(() => alert(newBal >= bal ? "HÚP! 🎉" : "MẤT TIỀN RỒI! 💸"), 300);
            }
            if(isAdmin) document.getElementById("btn-open").style.display = "none";
        }
    });

    db.ref('buffs/' + player).on('value', (snap) => {
        const amount = snap.val();
        if(amount) {
            localStorage.setItem(player, parseInt(localStorage.getItem(player)) + amount);
            updateUI();
            alert("Admin vừa bơm cho ní " + amount + " xu!");
            db.ref('buffs/' + player).remove();
        }
    });
}

function adminBuff() {
    const t = document.getElementById("adm-target").value.trim();
    const a = parseInt(document.getElementById("adm-amount").value);
    if(t && a && db) {
        db.ref('buffs/' + t).set(a);
        alert("Đã gửi lệnh bơm!");
    }
}
</script>
</body>
</html>
