<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Casino Royal</title>
    <!-- PHẢI CÓ 2 DÒNG NÀY MỚI CHẠY ĐƯỢC -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; }
        body { background: #0a3d1d; color: white; font-family: sans-serif; text-align: center; }
        .plate { width: 150px; height: 150px; background: #eee; border-radius: 50%; margin: 20px auto; position: relative; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .dice { width: 30px; height: 30px; background: white; color: black; border-radius: 5px; line-height: 30px; font-weight: bold; }
        .bowl { width: 160px; height: 160px; background: orange; border-radius: 50%; position: absolute; z-index: 10; transition: 0.5s; }
        .bowl.open { transform: translateY(-100px); opacity: 0.5; }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
        .btn { background: var(--gold); padding: 10px 20px; border-radius: 20px; cursor: pointer; color: black; font-weight: bold; border: none; margin: 10px; }
    </style>
</head>
<body>
    <div id="login">
        <h2>🎰 CASINO ROYAL</h2>
        <input type="text" id="uname" placeholder="Tên ní là gì..."><br><br>
        <button class="btn" onclick="login()">VÀO SÒNG</button>
    </div>

    <div id="game" style="display:none">
        <p>👤 <span id="n"></span> - 💰 <span id="b">0</span> xu</p>
        <div class="plate">
            <div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div>
            <div id="bowl" class="bowl"></div>
        </div>
        <h3 id="st">CHỜ CÁI...</h3>
        <button class="btn" onclick="bet('Tai')">TÀI</button>
        <button class="btn" onclick="bet('Xiu')">XỈU</button>
        <br><input type="number" id="amt" placeholder="Số xu cược">
        
        <div id="adm" style="display:none; border-top: 1px solid gold; margin-top: 20px;">
            <p>QUYỀN LỰC NHÀ CÁI</p>
            <button class="btn" onclick="xoc()">🎲 XÓC</button>
            <button class="btn" onclick="mo()">🔓 MỞ</button>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app",
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let user = "", side = "";

function login() {
    user = document.getElementById("uname").value;
    if(!user) return;
    if(!localStorage.getItem(user)) localStorage.setItem(user, 10000);
    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("n").innerText = user;
    if(user === "admin") document.getElementById("adm").style.display = "block";
    update();
    listen();
}

function update() { 
    document.getElementById("b").innerText = parseInt(localStorage.getItem(user)).toLocaleString(); 
}

function bet(s) { side = s; alert("Đã đặt " + s); }

function xoc() {
    const d = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
    db.ref('game').set({ st: "xoc", d: d });
}

function mo() { db.ref('game/st').set("mo"); }

function listen() {
    db.ref('game').on('value', (s) => {
        const data = s.val(); if(!data) return;
        const b = document.getElementById("bowl");
        if(data.st === "xoc") {
            b.classList.add("shake"); b.classList.remove("open");
            document.getElementById("st").innerText = "ĐANG XÓC...";
        } else {
            b.classList.remove("shake"); b.classList.add("open");
            document.getElementById("d1").innerText = data.d[0];
            document.getElementById("d2").innerText = data.d[1];
            document.getElementById("d3").innerText = data.d[2];
            let sum = data.d[0]+data.d[1]+data.d[2];
            let res = sum >= 11 ? "Tai" : "Xiu";
            document.getElementById("st").innerText = sum + " - " + res.toUpperCase();
            if(side !== "") {
                let a = parseInt(document.getElementById("amt").value) || 0;
                let m = parseInt(localStorage.getItem(user));
                localStorage.setItem(user, side === res ? m + a : m - a);
                side = ""; update();
            }
        }
    });
}
</script>
</body>
</html>
