<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal - Sieu Cap Final</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --bg: #0a2e1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .table { position: relative; height: 220px; display: flex; justify-content: center; align-items: center; }
        .plate { width: 200px; height: 200px; background: #ecf0f1; border-radius: 50%; border: 10px solid #95a5a6; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .dice { width: 45px; height: 45px; background: white; color: #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; }
        .bowl { width: 215px; height: 215px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; z-index: 10; transition: 0.8s; border: 2px solid #e67e22; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .bowl.open { transform: translateY(-160px) rotate(30deg); opacity: 0.9; pointer-events: none; }
        .shake-anim { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(3deg); } 100% { transform: rotate(-3deg); } }
        .zones { display: flex; justify-content: space-around; margin: 25px 0; }
        .circle-btn { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 4px solid rgba(255,255,255,0.2); }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .admin-only { background: rgba(183, 28, 28, 0.9); padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--gold); display: none; }
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        input { padding: 12px; border-radius: 25px; border: none; width: 80%; text-align: center; font-size: 1rem; margin: 5px 0; }
        #net-status { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: red; }
    </style>
</head>
<body>
<div id="login-screen" class="overlay"><div style="background:#1e272e; padding:40px; border-radius:20px; text-align:center; border: 2px solid var(--gold); width: 80%;"><h1 style="color:var(--gold)">🎰 CASINO ROYAL</h1><input type="text" id="username" placeholder="Tên ní ơi..."><br><br><button class="btn-main" onclick="vaoSong()">VÀO SÒNG</button></div></div>
<div class="app-container">
    <div class="header"><div>👤 <span id="u-name">...</span> <span id="net-status"></span></div><div style="color:var(--gold)">💰 <span id="u-balance">0</span> xu</div></div>
    <div class="table"><div class="plate"><div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div></div><div id="bowl" class="bowl"></div></div>
    <h2 id="status" style="color:var(--gold)">MỜI ADMIN XÓC...</h2>
    <div class="zones" style="display:flex; justify-content:space-around; margin:20px 0;"><div id="z-tai" class="circle-btn" style="background:var(--red)" onclick="pick('Tai')"><b>TÀI</b></div><div id="z-xiu" class="circle-btn" style="background:var(--blue)" onclick="pick('Xiu')"><b>XỈU</b></div></div>
    <input type="number" id="bet-amount" placeholder="Nhập xu cược...">
    <div id="admin-panel" class="admin-only"><div id="hack-view" style="color:#0f0; font-weight:bold; margin-bottom:10px;">SOI: ---</div><button class="btn-main" id="btn-xoc" onclick="xocDia()">🎲 XÓC ĐĨA CHUNG</button><button class="btn-main" id="btn-mo" onclick="moBat()" style="display:none; background:#2ecc71; margin-top:10px">🔓 MỞ BÁT CHUNG</button></div>
</div>
<script>
const config = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app", 
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};
firebase.initializeApp(config);
const db = firebase.database();
let player="", side="", isAdmin=false;

// Kiểm tra kết nối
db.ref('.info/connected').on('value', (s) => { document.getElementById('net-status').style.background = s.val() ? '#0f0' : 'red'; });

function vaoSong() {
    let name = document.getElementById("username").value.trim();
    if(!name) return alert("Nhập tên!");
    player = name; document.getElementById("login-screen").style.display = "none"; document.getElementById("u-name").innerText = player;
    if(!localStorage.getItem(player)) localStorage.setItem(player, 1000);
    if(player.toLowerCase()==="admin") { isAdmin=true; document.getElementById("admin-panel").style.display="block"; }
    updateUI(); listen();
}
function updateUI() { document.getElementById("u-balance").innerText = parseInt(localStorage.getItem(player)).toLocaleString(); }
function pick(s) { side = s; document.querySelectorAll('.circle-btn').forEach(b => b.style.border="4px solid rgba(255,255,255,0.2)"); document.getElementById('z-'+s.toLowerCase()).style.border="5px solid #fff"; }

function xocDia() {
    const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1, d3 = Math.floor(Math.random()*6)+1;
    db.ref('song_bai_v1').set({ status: "shaking", d1: d1, d2: d2, d3: d3, time: Date.now() });
}
function moBat() { db.ref('song_bai_v1/status').set("open"); }

function listen() {
    db.ref('song_bai_v1').on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        const bowl = document.getElementById("bowl");
        if(data.status === "shaking") {
            bowl.classList.remove("open"); bowl.classList.add("shake-anim"); document.getElementById("status").innerText = "ĐANG XÓC...";
            if(isAdmin) { document.getElementById("btn-mo").style.display = "block"; let s = data.d1+data.d2+data.d3; document.getElementById("hack-view").innerText = "SOI: "+(s>=11?"TÀI":"XỈU")+" ("+s+")"; }
        }
        if(data.status === "open") {
            bowl.classList.remove("shake-anim"); bowl.classList.add("open");
            let s = data.d1+data.d2+data.d3, res = (s>=11)?"Tai":"Xiu";
            document.getElementById("d1").innerText = data.d1; document.getElementById("d2").innerText = data.d2; document.getElementById("d3").innerText = data.d3;
            document.getElementById("status").innerText = s + " - " + res.toUpperCase();
            if(side !== "") {
                let bal = parseInt(localStorage.getItem(player)), bet = parseInt(document.getElementById("bet-amount").value)||0;
                let nB = (side === res)?(bal+bet):(bal-bet); localStorage.setItem(player, nB); updateUI(); side = "";
                setTimeout(()=>alert(nB>=bal?"HÚP! 🎉":"THUA RỒI! 💸"), 200);
            }
            if(isAdmin) document.getElementById("btn-mo").style.display = "none";
        }
    });
}
</script>
</body>
</html>
