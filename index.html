<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Casino Royal</title>
    <style>
        body { background: #0a3d1d; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .plate { width: 150px; height: 150px; background: #eee; border-radius: 50%; margin: 20px auto; position: relative; display: flex; justify-content: center; align-items: center; border: 5px solid #777; }
        .bowl { width: 160px; height: 160px; background: orange; border-radius: 50%; position: absolute; transition: 0.5s; cursor: pointer; }
        .bowl.open { transform: translateY(-100px); opacity: 0.7; }
        .dice { color: black; font-size: 20px; font-weight: bold; margin: 5px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div id="login-box">
        <h1>🎰 CASINO ROYAL</h1>
        <input type="text" id="uname" placeholder="Nhập tên..." style="padding:10px; border-radius:10px;"><br><br>
        <button onclick="vaoSong()" style="background:gold;">VÀO SÒNG</button>
    </div>

    <div id="game-box" style="display:none;">
        <p>Chào ní: <b id="display-name"></b> | Tiền: <b id="money">0</b> xu</p>
        <div class="plate">
            <div class="dice" id="res">?</div>
            <div id="bat" class="bowl"></div>
        </div>
        <button onclick="xoc()" style="background:white;">🎲 XÓC ĐĨA</button>
        <button onclick="moBat()" style="background:lime;">🔓 MỞ BÁT</button>
    </div>

    <script>
        function vaoSong() {
            var name = document.getElementById('uname').value;
            if (name == "") { alert("Nhập tên đã ní!"); return; }
            
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
            document.getElementById('display-name').innerText = name;
            
            if (!localStorage.getItem(name)) { localStorage.setItem(name, 10000); }
            document.getElementById('money').innerText = localStorage.getItem(name);
        }

        function xoc() {
            document.getElementById('bat').classList.remove('open');
            document.getElementById('res').innerText = "Đang xóc...";
        }

        function moBat() {
            document.getElementById('bat').classList.add('open');
            var num = Math.floor(Math.random() * 18) + 3; // Random từ 3 đến 18
            document.getElementById('res').innerText = num;
        }
    </script>
</body>
</html>
