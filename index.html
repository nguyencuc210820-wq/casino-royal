<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal - Sòng Bài Gương Soi</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --bg: #0a2e1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .table { position: relative; height: 240px; display: flex; justify-content: center; align-items: center; }
        .plate { width: 210px; height: 210px; background: #ecf0f1; border-radius: 50%; border: 10px solid #95a5a6; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dice { width: 45px; height: 45px; background: white; color: #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; }
        .bowl { width: 225px; height: 225px; background: radial-gradient(circle, #f1c40f, #d35400); border-radius: 50%; position: absolute; z-index: 10; transition: 0.8s; border: 2px solid #e67e22; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .bowl.open { transform: translateY(-160px) rotate(30deg); opacity: 0.9; }
        .shake-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: rotate(3deg); } 50% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
        .zones { display: flex; justify-content: space-around; margin: 25px 0; }
        .circle-btn { width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 4px solid rgba(255,255,255,0.2); }
        .circle-btn.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 20px #fff; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .admin-only { background: rgba(183, 28, 28, 0.9); padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--gold); display: none; }
        #hack-view { color: #00ff00; font-size: 1.5rem; font-weight: bold; background: black; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: #1e272e; padding: 40px; border-radius: 20px; text-align: center; }
        input { padding: 12px; border-radius: 25px; border: none; width: 85%; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>
<div id="login-screen" class="overlay">
    <div class="login-box">
        <h1 style="color:var(--gold)">🎰 CASINO ROYAL</h1>
        <input type="text" id="username" placeholder="Tên nhân vật..."><br><br>
        <button class="btn-main" onclick="login()">VÀO SÒNG</button>
    </div>
</div>
<div class="app-container">
    <div class="header">
        <div>👤 <span id="u-name">...</span></div>
        <div style="color:var(--gold)">💰 <span id="u-balance">0</span> xu</div>
    </div>
    <div class="table">
        <div class="plate"><div class="dice" id="d1">?</div><div class="dice" id="d2">?</div><div class="dice" id="d3">?</div></div>
        <div id="bowl" class="bowl"></div>
    </div>
    <h2 id="status" style="color:var(--gold)">CHỜ NHÀ CÁI...</h2>
    <div class="zones">
        <div id="z-tai" class="circle-btn" style="background:var(--red)" onclick="pick('Tai')"><b>TÀI</b></div>
        <div id="z-xiu" class="circle-btn" style="background:var(--blue)" onclick="pick('Xiu')"><b>XỈU</b></div>
    </div>
    <input type="number" id="bet-amount" placeholder="Số xu cược...">
    <div id="admin-panel" class="admin-only">
        <div id="hack-view">SOI THẤY: ---</div>
        <button class="btn-main" onclick="shakeGame()">🎲 XÓC ĐĨA CHUNG</button>
        <button class="btn-main" id="btn-open-global" onclick="openBowl()" style="display:none; background:#2ecc71">🔓 MỞ BÁT CHUNG</button>
        <hr><input type="text" id="adm-target" placeholder="Tên người nhận"><input type="number" id="adm-amount" placeholder="Số xu">
        <button onclick="adminBuff()" style="background:white; color:black; width:100%; border-radius:10px; padding:10px; font-weight:bold; border:none; cursor:pointer;">XÁC NHẬN BƠM</button>
    </div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPg1xGWBqvg7USMkZ8_TAJ3zvUVOffSIA",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebasedatabase.app", 
  projectId: "casinobanbe",
  appId: "1:670247607539:web:8201c606ff6d223d1b2b86"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let player = "", selectedSide = "", isAdmin = false;
function login() {
    player = document.getElementById("username").value.trim();
    if(!player) return alert("Tên đâu ní?");
    if(!localStorage.getItem(player)) localStorage.setItem(player, 1000);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("u-name").innerText = player;
    if(player.toLowerCase() === "admin") { isAdmin = true; document.getElementById("admin-panel").style.display = "block"; }
    updateUI(); listenGame();
}
function updateUI() { document.getElementById("u-balance").innerText = parseInt(localStorage.getItem(player)).toLocaleString(); }
function pick(s) { selectedSide = s; document.getElementById("z-tai").style.border = (s==='Tai')?"5px solid #fff":"4px solid rgba(255,255,255,0.2)"; document.getElementById("z-xiu").style.border = (s==='Xiu')?"5px solid #fff":"4px solid rgba(255,255,255,0.2)"; }
function shakeGame() { const d = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1]; db.ref('sòng').set({ trạng_thái: "đang_xóc", xúc_xắc: d }); }
function openBowl() { db.ref('sòng/trạng_thái').set("đã_mở"); }
function listenGame() {
    db.ref('sòng').on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        const bowl = document.getElementById("bowl");
        if(data.trạng_thái === "đang_xóc") {
            bowl.classList.remove("open"); bowl.classList.add("shake-anim"); document.getElementById("status").innerText = "ĐANG XÓC ĐĨA...";
            if(isAdmin) { document.getElementById("btn-open-global").style.display = "block"; let sum = data.xúc_xắc[0]+data.xúc_xắc[1]+data.xúc_xắc[2]; document.getElementById("hack-view").innerText = "SOI: "+(sum>=11?"TÀI":"XỈU")+" ("+sum+")"; }
        }
        if(data.trạng_thái === "đã_mở") {
            bowl.classList.remove("shake-anim"); bowl.classList.add("open");
            let sum = data.xúc_xắc[0]+data.xúc_xắc[1]+data.xúc_xắc[2], res = (sum>=11)?"Tai":"Xiu";
            document.getElementById("d1").innerText = data.xúc_xắc[0]; document.getElementById("d2").innerText = data.xúc_xắc[1]; document.getElementById("d3").innerText = data.xúc_xắc[2];
            document.getElementById("status").innerText = sum + " - " + res.toUpperCase();
            if(selectedSide !== "") {
                let bal = parseInt(localStorage.getItem(player)), bet = parseInt(document.getElementById("bet-amount").value)||0;
                let nB = (selectedSide === res)?(bal+bet):(bal-bet); localStorage.setItem(player, nB); updateUI(); selectedSide = "";
                setTimeout(()=>alert(nB>=bal?"HÚP! 🎉":"MẤT TIỀN RỒI! 💸"), 200);
            }
            if(isAdmin) document.getElementById("btn-open-global").style.display = "none";
        }
    });
}
function adminBuff() {
    const t = document.getElementById("adm-target").value.trim(), a = parseInt(document.getElementById("adm-amount").value);
    if(t && a) { localStorage.setItem(t, (parseInt(localStorage.getItem(t))||0)+a); alert("Đã bơm xu cho "+t); updateUI(); }
}
</script>
</body>
</html>
